# ============================================================
#  Sovereign-DevKit: Continuous Integration
#  Runs LogSanitizer automatically on every push & pull request
#  Author: El Madani El Mkhitar
# ============================================================

name: CI — Leak Detection

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  scan:
    name: Scan for Sensitive Data Leaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run LogSanitizer on Full Repository
        run: node LogSanitizer.js . --ext .js,.ts,.json,.env,.yml,.yaml,.md

      - name: Upload Scan Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: leak-scan-report
          path: leak-report.txt
          retention-days: 7
